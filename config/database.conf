# Configuração do Banco de Dados

# Driver do banco (sqlite, mysql, postgresql)
DB_DRIVER=sqlite

# Arquivo do SQLite
DB_PATH=database/app.db

# Configurações para MySQL (se necessário)
DB_HOST=localhost
DB_PORT=3306
DB_DATABASE=cobol_api
DB_USERNAME=root
DB_PASSWORD=

# Pool de conexões
DB_POOL=5
DB_TIMEOUT=30
