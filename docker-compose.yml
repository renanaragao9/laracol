version: "3.8"

services:
  laracol:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laracol-api
    ports:
      - "8080:8000"
    volumes:
      - ./storage/logs:/app/storage/logs
      - ./app:/app/app
      - ./routes:/app/routes
      - ./config:/app/config
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - LOG_LEVEL=debug
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - laracol-net

networks:
  laracol-net:
    driver: bridge
